services:
  db:
    image: postgres:16-alpine
    container_name: mytech_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - mytech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mytech_backend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mytech_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mytech_pgdata: